name: "Lock threads"
permissions:
  issues: write
  pull-requests: write
  discussions: write
on:
  workflow_dispatch:
  schedule:
    - cron: "37 2 * * *"
  # CI-VERIFY / DRY-RUN ONLY -- DO NOT MERGE: trigger on the verification branch;
  # the actual lock-threads step is disabled below so no threads are locked.
  push:
    branches:
      - claude/ubuntu-26-arm64-gha-ezzy7y-verify

jobs:
  lock:
    runs-on: ubuntu-26.04
    steps:
      - uses: krlmlr/lock-threads@patch-1
        if: false # DRY-RUN: never lock issues/PRs/discussions
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: "365"
          issue-lock-reason: ""
          issue-comment: >
            This old thread has been automatically locked. If you think you have
            found something related to this, please open a new issue and link to this
            old issue if necessary.
