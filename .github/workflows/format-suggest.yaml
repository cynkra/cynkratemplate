# Workflow derived from https://github.com/posit-dev/setup-air/tree/main/examples

on:
  # CI-VERIFY / DRY-RUN ONLY -- DO NOT MERGE. The real workflow uses
  # `pull_request_target` (elevated token for fork PRs). But pull_request_target
  # runs the workflow file from the repo's DEFAULT branch (main), so a modified
  # format-suggest cannot be tested via a PR without touching main. To exercise
  # the style + reviewdog logic end-to-end, this middle branch switches the
  # trigger to `pull_request` (which uses the PR's own workflow file) and scopes
  # it to PRs whose base is this middle branch -- i.e. only the outermost test PR
  # triggers it, so this middle PR itself runs no checks.
  pull_request:
    branches:
      - claude/ubuntu-26-arm64-gha-ezzy7y-fmt-base

name: format-suggest.yaml

jobs:
  format-suggest:
    name: format-suggest
    runs-on: ubuntu-26.04
    # DRY-RUN: fork-only gate removed so this runs for the same-repo test PR.
    # (The trigger's branches filter already scopes this to the outermost PR.)

    permissions:
      # Required to push suggestion comments to the PR
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/workflows/style

      - name: Suggest
        uses: reviewdog/action-suggester@v1
        with:
          level: error
          fail_level: error
          tool_name: air-and-clang-format
